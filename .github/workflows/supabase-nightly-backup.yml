name: Supabase nightly backup

on:
  schedule:
    # GitHub Actions cron is UTC only (no timezone support).
    # To run every Friday at 23:00 Europe/Rome year-round (CET/CEST):
    # - during CEST (UTC+2) => 21:00 UTC
    # - during CET  (UTC+1) => 22:00 UTC
    # Schedule both and gate execution by checking local weekday+hour in Europe/Rome.
    - cron: '0 21 * * 5'
    - cron: '0 22 * * 5'
  workflow_dispatch:
    inputs:
      schemas:
        description: 'Comma-separated schemas to backup (default: public)'
        required: false
        default: 'public'
      run_full_dump:
        description: 'Create also a full database dump (true|false)'
        required: false
        default: 'true'

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Time gate (Friday 23:00 Europe/Rome)
        id: timegate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_hour="$(TZ=Europe/Rome date +%H)"
          local_dow="$(TZ=Europe/Rome date +%u)"  # 1=Mon ... 5=Fri ... 7=Sun

          if [[ "$local_dow" == "5" && "$local_hour" == "23" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: local time in Europe/Rome is DOW=$local_dow hour=$local_hour (not Friday 23)."
          fi

      - name: Install PostgreSQL client (v17)
        if: steps.timegate.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates wget gnupg lsb-release

          sudo install -d /usr/share/postgresql-common/pgdg
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-17

      - name: Run backup script
        if: steps.timegate.outputs.should_run == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          # Optional: set this to a Supabase Connection Pooler URI if the direct DB host is unreachable from GitHub runners.
          SUPABASE_DB_URL_FALLBACK: ${{ secrets.SUPABASE_DB_URL_POOLER }}
          PG_BIN_DIR: /usr/lib/postgresql/17/bin
          # github.event.inputs exists only for workflow_dispatch; on schedule it's empty and the script defaults.
          SCHEMAS: ${{ github.event.inputs.schemas }}
          RUN_FULL_DUMP: ${{ github.event.inputs.run_full_dump }}
        run: |
          echo "psql version:"; /usr/lib/postgresql/17/bin/psql --version || true
          echo "pg_dump version:"; /usr/lib/postgresql/17/bin/pg_dump --version || true
          bash scripts/supabase-backup.sh

      - name: Upload backup artifact
        if: steps.timegate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup_out/*.tar.gz
          if-no-files-found: error
          retention-days: 30
